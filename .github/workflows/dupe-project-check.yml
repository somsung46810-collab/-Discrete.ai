name: Discrete.ai DUPE Project Check

on:
  push:
    branches: [run-discrete-dupe-check]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-dupe:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate shell handlers
        run: |
          bash -n scripts/dupe_release.sh
          bash -n scripts/deploy_remote.sh

      - name: Run DUPE safety tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          pytest -q tests/test_dupe_deployment.py

      - name: Run repository health check
        run: python scripts/check_all.py

      - name: Run media diagnostic
        run: python scripts/media_check.py --output media-diagnostic.json

      - name: Upload diagnostic result
        uses: actions/upload-artifact@v4
        with:
          name: discrete-ai-dupe-check-${{ github.sha }}
          path: media-diagnostic.json
          if-no-files-found: error

      - name: Write summary
        run: |
          {
            echo "## Discrete.ai DUPE project check"
            echo "- DUPE shell handlers: validated"
            echo "- DUPE safety tests: passed"
            echo "- Repository health check: passed"
            echo "- Media diagnostic: generated"
            echo "- Live environment modified: no"
          } >> "$GITHUB_STEP_SUMMARY"
