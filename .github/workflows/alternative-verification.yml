name: Alternative Verification

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ungated-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install build

      - name: Run local full-stack verification
        run: python scripts/alternative_verification.py

      - name: Record alternative verification
        run: |
          {
            echo "## Alternative verification"
            echo "- Repository checkup: passed"
            echo "- Tests: passed"
            echo "- Build and production package: passed"
            echo "- Local full-stack runtime smoke test: passed"
            echo "- GitHub deployment environments: not required"
          } >> "$GITHUB_STEP_SUMMARY"
