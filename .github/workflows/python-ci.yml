name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check

      - name: Lint embedded runtime
        run: ruff check ai_generation.py cyglobs_app.py graphics_runtime.py cyglobs_framework scripts tests

      - name: Import runtime
        env:
          DISCRETE_SECRET_KEY: ci-test-secret-key
          DISCRETE_DATABASE_PATH: ./ci-test.db
          DISCRETE_STORAGE_DIR: ./ci-storage
        run: python -c "from cyglobs_app import create_server; from ai_generation import provider_features; print(create_server, provider_features())"

      - name: Run tests
        env:
          DISCRETE_SECRET_KEY: ci-test-secret-key
          DISCRETE_DATABASE_PATH: ./ci-test.db
          DISCRETE_STORAGE_DIR: ./ci-storage
        run: pytest --cov=ai_generation --cov=cyglobs_app --cov=cyglobs_framework --cov=graphics_runtime --cov-report=term-missing

      - name: Build package
        run: python -m pip install build && python -m build

  production-package:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build full-stack production package
        run: python scripts/build_production_package.py

      - name: Upload production package
        uses: actions/upload-artifact@v4
        with:
          name: discrete-art-studio-production-${{ github.sha }}
          path: production-dist/
          if-no-files-found: error
          retention-days: 30
