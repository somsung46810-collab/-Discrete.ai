name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check

      - name: Lint core packages
        run: ruff check discrete_ai.py graphics_runtime.py cyglobs_framework tests

      - name: Import production API
        env:
          DISCRETE_SECRET_KEY: ci-test-secret-key
          DISCRETE_DATABASE_URL: sqlite:///./ci-test.db
          DISCRETE_STORAGE_DIR: ./ci-storage
        run: python -c "from studio_api import app; print(app.title)"

      - name: Run tests
        env:
          DISCRETE_SECRET_KEY: ci-test-secret-key
          DISCRETE_DATABASE_URL: sqlite:///./ci-test.db
          DISCRETE_STORAGE_DIR: ./ci-storage
        run: pytest

      - name: Build package
        run: python -m pip install build && python -m build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t discrete-art-studio:ci .
